name: Deploy to GCP (Test)

on:
  push:
    branches: [ test ]
  workflow_dispatch:
    inputs:
      force_backend_pip:
        description: 'Run pip install -r backend/requirements.txt (even if file unchanged)'
        type: boolean
        default: false

concurrency:
  group: deploy-test
  cancel-in-progress: true

jobs:
  deploy:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to test VM
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.TEST_HOST }}
          username: ${{ secrets.TEST_USERNAME }}
          key: ${{ secrets.TEST_SSH_KEY }}
          script_stop: true
          script: |
            cd AstrologyApp
            export DEPLOY_BRANCH="${{ github.ref_name }}"
            export FORCE_BACKEND_PIP="${{ github.event.inputs.force_backend_pip == 'true' && 'true' || 'false' }}"
            bash deploy.sh
            for i in $(seq 1 15); do
              if curl -fsS http://127.0.0.1:8001/api/health >/dev/null; then
                break
              fi
              if [ "$i" -eq 15 ]; then
                echo "Backend health check failed after workflow retries"
                exit 1
              fi
              sleep 2
            done
            for i in $(seq 1 15); do
              if curl -fsS -I http://127.0.0.1:3001/ >/dev/null; then
                break
              fi
              if [ "$i" -eq 15 ]; then
                echo "Frontend health check failed after workflow retries"
                exit 1
              fi
              sleep 2
            done
