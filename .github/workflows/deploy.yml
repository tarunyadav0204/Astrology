# Push to main deploys the app on the current Managed Instance Group VMs one at
# a time. VM names are discovered dynamically from the MIG, so autoscaling or
# self-healing replacements do not require changing this workflow.
#
# ChunkLoadError / "Unexpected token '<'" during deploy: the HTTP(S) load balancer
# can send HTML (from one VM) and a later /static/js/*.chunk.js request to another
# VM that is still on the previous build (or missing that hashed file). Frontend
# index.js includes a one-time reload recovery for that case. Mitigations: serve
# hashed static assets from a single source (e.g. Cloud CDN + bucket), or session
# affinity, or parallel same-artifact sync to all backends before traffic sees the new HTML.
name: Deploy to GCP

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      deployment_mode:
        description: "app = run deploy.sh on existing VMs; replace_vms = recreate MIG VMs"
        required: true
        default: app
        type: choice
        options:
          - app
          - replace_vms
      force_backend_pip:
        description: "Run pip install even if requirements.txt did not change"
        required: false
        default: false
        type: boolean
      force_frontend_deploy:
        description: "Force frontend rebuild/restart"
        required: false
        default: false
        type: boolean
      force_full_deploy:
        description: "Force full backend/frontend dependency setup and rebuild"
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-prod-main
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

    - name: Set up gcloud
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ vars.GCP_PROJECT_ID }}

    - name: Detect frontend artifact need
      id: frontend_artifact
      if: ${{ github.event_name != 'workflow_dispatch' || inputs.deployment_mode == 'app' }}
      shell: bash
      env:
        FORCE_FRONTEND_DEPLOY: ${{ github.event_name == 'workflow_dispatch' && inputs.force_frontend_deploy || false }}
        FORCE_FULL_DEPLOY: ${{ github.event_name == 'workflow_dispatch' && inputs.force_full_deploy || false }}
        BEFORE_SHA: ${{ github.event.before }}
      run: |
        set -euo pipefail
        required=false
        if [[ "${FORCE_FULL_DEPLOY}" == "true" || "${FORCE_FRONTEND_DEPLOY}" == "true" ]]; then
          required=true
        else
          if [[ -n "${BEFORE_SHA}" && "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            if git diff --name-only "${BEFORE_SHA}" "${GITHUB_SHA}" | grep -E -q '^frontend/|^frontend-next/'; then
              required=true
            fi
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            if git diff --name-only HEAD^ HEAD | grep -E -q '^frontend/|^frontend-next/'; then
              required=true
            fi
          fi
        fi
        echo "required=${required}" >> "${GITHUB_OUTPUT}"

    - name: Set up Node.js
      if: ${{ steps.frontend_artifact.outputs.required == 'true' }}
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
        cache-dependency-path: |
          frontend/package-lock.json
          frontend-next/package-lock.json

    - name: Build frontend artifact once
      if: ${{ steps.frontend_artifact.outputs.required == 'true' }}
      shell: bash
      env:
        CI: 'true'
        GENERATE_SOURCEMAP: 'false'
        INLINE_RUNTIME_CHUNK: 'true'
        PRERENDER: 'true'
      run: |
        set -euo pipefail
        npm --prefix frontend ci
        npm --prefix frontend-next ci
        unset PRERENDER_ROUTES
        SITEMAP_URL="https://astroroshni.com/sitemap.xml" \
        BLOG_API_URL="https://astroroshni.com" \
        npm --prefix frontend run build:ci
        tar -czf "${RUNNER_TEMP}/frontend-build-${GITHUB_SHA}.tgz" -C frontend build

    - name: Publish frontend artifact to GCS
      if: ${{ steps.frontend_artifact.outputs.required == 'true' }}
      shell: bash
      env:
        GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        GCP_FRONTEND_ARTIFACT_BUCKET: ${{ vars.GCP_FRONTEND_ARTIFACT_BUCKET }}
      run: |
        set -euo pipefail
        if [[ -z "${GCP_FRONTEND_ARTIFACT_BUCKET}" ]]; then
          echo "❌ GCP_FRONTEND_ARTIFACT_BUCKET GitHub variable is required to publish frontend artifacts"
          exit 1
        fi
        gcloud config set project "${GCP_PROJECT_ID}"
        VERSIONED_URI="gs://${GCP_FRONTEND_ARTIFACT_BUCKET}/prod/frontend-build-${GITHUB_SHA}.tgz"
        LATEST_URI="gs://${GCP_FRONTEND_ARTIFACT_BUCKET}/prod/frontend-build-latest.tgz"
        gcloud storage cp "${RUNNER_TEMP}/frontend-build-${GITHUB_SHA}.tgz" "${VERSIONED_URI}"
        gcloud storage cp "${RUNNER_TEMP}/frontend-build-${GITHUB_SHA}.tgz" "${LATEST_URI}"
        echo "Published frontend artifact:"
        echo "  ${VERSIONED_URI}"
        echo "  ${LATEST_URI}"

    - name: Rolling app deploy on current MIG VMs
      if: ${{ github.event_name != 'workflow_dispatch' || inputs.deployment_mode == 'app' }}
      env:
        GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        CLOUDSDK_CORE_PROJECT: ${{ vars.GCP_PROJECT_ID }}
        CLOUDSDK_PROJECT: ${{ vars.GCP_PROJECT_ID }}
        GCP_MIG_NAME: ${{ vars.GCP_MIG_NAME }}
        GCP_MIG_ZONE: ${{ vars.GCP_MIG_ZONE }}
        FORCE_BACKEND_PIP: ${{ github.event_name == 'workflow_dispatch' && inputs.force_backend_pip || false }}
        FORCE_FRONTEND_DEPLOY: ${{ github.event_name == 'workflow_dispatch' && inputs.force_frontend_deploy || false }}
        FORCE_FULL_DEPLOY: ${{ github.event_name == 'workflow_dispatch' && inputs.force_full_deploy || false }}
        FRONTEND_ARTIFACT_REQUIRED: ${{ steps.frontend_artifact.outputs.required }}
      run: |
        set -euo pipefail
        echo "========== GitHub Actions: rolling app deploy start $(date -u '+%Y-%m-%d %H:%M:%S UTC') =========="
        gcloud config set project "${GCP_PROJECT_ID}"

        mapfile -t INSTANCES < <(
          gcloud compute instance-groups managed list-instances "${GCP_MIG_NAME}" \
            --project "${GCP_PROJECT_ID}" \
            --zone "${GCP_MIG_ZONE}" \
            --filter="instanceStatus=RUNNING" \
            --format="value(instance.basename())" \
          | sort
        )

        if [ "${#INSTANCES[@]}" -eq 0 ]; then
          echo "❌ No RUNNING instances found in MIG ${GCP_MIG_NAME}"
          exit 1
        fi

        echo "📋 Deploying to ${#INSTANCES[@]} current MIG instance(s): ${INSTANCES[*]}"
        for INSTANCE in "${INSTANCES[@]}"; do
          echo "========== Deploying ${INSTANCE} $(date -u '+%Y-%m-%d %H:%M:%S UTC') =========="
          gcloud compute ssh "tarun_yadav@${INSTANCE}" \
            --project "${GCP_PROJECT_ID}" \
            --zone "${GCP_MIG_ZONE}" \
            --tunnel-through-iap \
            --quiet \
            --command "for i in \$(seq 1 60); do [ -d /home/tarun_yadav/AstrologyApp ] && exit 0; sleep 5; done; echo 'AstrologyApp repo not ready on ${INSTANCE}'; exit 1"

          FRONTEND_REMOTE_ARCHIVE=""
          if [ "${FRONTEND_ARTIFACT_REQUIRED}" = "true" ]; then
            FRONTEND_REMOTE_ARCHIVE="/tmp/frontend-build-${GITHUB_SHA}.tgz"
            gcloud compute scp "${RUNNER_TEMP}/frontend-build-${GITHUB_SHA}.tgz" "tarun_yadav@${INSTANCE}:${FRONTEND_REMOTE_ARCHIVE}" \
              --project "${GCP_PROJECT_ID}" \
              --zone "${GCP_MIG_ZONE}" \
              --tunnel-through-iap \
              --quiet
          fi

          gcloud compute ssh "tarun_yadav@${INSTANCE}" \
            --project "${GCP_PROJECT_ID}" \
            --zone "${GCP_MIG_ZONE}" \
            --tunnel-through-iap \
            --quiet \
            --command "cd /home/tarun_yadav/AstrologyApp && export GIT_SSH_COMMAND='ssh -i /home/tarun_yadav/.ssh/astroroshni_startup_deploy_key -o IdentitiesOnly=yes' DEPLOY_BRANCH='main' FORCE_BACKEND_PIP='${FORCE_BACKEND_PIP}' FORCE_FRONTEND_DEPLOY='${FORCE_FRONTEND_DEPLOY}' FORCE_FULL_DEPLOY='${FORCE_FULL_DEPLOY}' FRONTEND_PREBUILT_ARCHIVE='${FRONTEND_REMOTE_ARCHIVE}' SYNC_GCP_SECRETS='true' && bash deploy.sh && if [ -n '${FRONTEND_REMOTE_ARCHIVE}' ]; then rm -f '${FRONTEND_REMOTE_ARCHIVE}'; fi"

          echo "🔎 Waiting for ${INSTANCE} local app health"
          gcloud compute ssh "tarun_yadav@${INSTANCE}" \
            --project "${GCP_PROJECT_ID}" \
            --zone "${GCP_MIG_ZONE}" \
            --tunnel-through-iap \
            --quiet \
            --command "for i in \$(seq 1 30); do curl -fsS --max-time 5 http://127.0.0.1:8001/api/health >/dev/null && curl -fsS --max-time 5 http://127.0.0.1:3001/ >/dev/null && exit 0; sleep 5; done; echo 'health check failed on ${INSTANCE}'; exit 1"

          echo "✅ ${INSTANCE} deployed and healthy"
        done

        echo "🔎 Final public health check"
        curl -fsS --max-time 20 "https://astroroshni.com/api/health" >/dev/null
        curl -fsS --max-time 20 "https://astroroshni.com/" >/dev/null
        echo "========== GitHub Actions: rolling app deploy end   $(date -u '+%Y-%m-%d %H:%M:%S UTC') =========="

    - name: Emergency rolling VM replacement
      if: ${{ github.event_name == 'workflow_dispatch' && inputs.deployment_mode == 'replace_vms' }}
      env:
        GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        CLOUDSDK_CORE_PROJECT: ${{ vars.GCP_PROJECT_ID }}
        CLOUDSDK_PROJECT: ${{ vars.GCP_PROJECT_ID }}
        GCP_MIG_NAME: ${{ vars.GCP_MIG_NAME }}
        GCP_MIG_ZONE: ${{ vars.GCP_MIG_ZONE }}
      run: |
        set -euo pipefail
        echo "========== GitHub Actions: MIG replacement start $(date -u '+%Y-%m-%d %H:%M:%S UTC') =========="
        gcloud config set project "${GCP_PROJECT_ID}"
        gcloud compute instance-groups managed rolling-action replace "${GCP_MIG_NAME}" \
          --project "${GCP_PROJECT_ID}" \
          --zone "${GCP_MIG_ZONE}" \
          --max-unavailable 1 \
          --max-surge 1
        gcloud compute instance-groups managed wait-until "${GCP_MIG_NAME}" \
          --project "${GCP_PROJECT_ID}" \
          --stable \
          --zone "${GCP_MIG_ZONE}" \
          --timeout 3600
        gcloud compute instance-groups managed list-instances "${GCP_MIG_NAME}" \
          --project "${GCP_PROJECT_ID}" \
          --zone "${GCP_MIG_ZONE}"
        echo "========== GitHub Actions: MIG replacement end   $(date -u '+%Y-%m-%d %H:%M:%S UTC') =========="
