# Push to main replaces the Managed Instance Group one VM at a time. Each fresh
# VM startup script pulls latest main, syncs Secret Manager files, and runs deploy.sh.
name: Deploy to GCP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

    - name: Set up gcloud
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ vars.GCP_PROJECT_ID }}

    - name: Rolling deploy Managed Instance Group
      env:
        GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        CLOUDSDK_CORE_PROJECT: ${{ vars.GCP_PROJECT_ID }}
        CLOUDSDK_PROJECT: ${{ vars.GCP_PROJECT_ID }}
        GCP_MIG_NAME: ${{ vars.GCP_MIG_NAME }}
        GCP_MIG_ZONE: ${{ vars.GCP_MIG_ZONE }}
      run: |
        set -euo pipefail
        echo "========== GitHub Actions: MIG deploy start $(date -u '+%Y-%m-%d %H:%M:%S UTC') =========="
        gcloud config set project "${GCP_PROJECT_ID}"
        gcloud compute instance-groups managed rolling-action replace "${GCP_MIG_NAME}" \
          --project "${GCP_PROJECT_ID}" \
          --zone "${GCP_MIG_ZONE}" \
          --max-unavailable 1 \
          --max-surge 1
        gcloud compute instance-groups managed wait-until "${GCP_MIG_NAME}" \
          --project "${GCP_PROJECT_ID}" \
          --stable \
          --zone "${GCP_MIG_ZONE}" \
          --timeout 3600
        gcloud compute instance-groups managed list-instances "${GCP_MIG_NAME}" \
          --project "${GCP_PROJECT_ID}" \
          --zone "${GCP_MIG_ZONE}"
        echo "========== GitHub Actions: MIG deploy end   $(date -u '+%Y-%m-%d %H:%M:%S UTC') =========="
