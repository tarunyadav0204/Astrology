<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#e91e63" />
  <meta name="robots" content="noindex" />
  <title>We’ll be right back — AstroRoshni</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: #1a1a2e;
      background: linear-gradient(160deg, #fdf2f7 0%, #f0f4ff 45%, #fff8f0 100%);
    }
    .card {
      max-width: 28rem;
      width: 100%;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 1rem;
      padding: 2rem 1.75rem;
      box-shadow: 0 12px 40px rgba(233, 30, 99, 0.12), 0 4px 12px rgba(0, 0, 0, 0.06);
      text-align: center;
    }
    .badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #e91e63;
      margin-bottom: 0.75rem;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      margin: 0 0 0.75rem;
      line-height: 1.3;
    }
    p {
      margin: 0 0 1rem;
      font-size: 0.95rem;
      line-height: 1.55;
      color: #444;
    }
    p:last-of-type { margin-bottom: 0; }
    button {
      margin-top: 1.25rem;
      padding: 0.65rem 1.25rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      background: #e91e63;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
    }
    button:hover { background: #c2185b; }
    button:focus-visible { outline: 2px solid #e91e63; outline-offset: 2px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Maintenance</div>
    <h1>We’re updating AstroRoshni</h1>
    <p>
      The site is temporarily unavailable while we deploy improvements or recover from an issue.
      Please try again in a few minutes.
    </p>
    <p>
      If you need help urgently, contact support through your usual channel.
    </p>
    <button type="button" onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
