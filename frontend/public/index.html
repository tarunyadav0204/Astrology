<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#e91e63" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-touch-fullscreen" content="yes" />
  <style>
    /* iOS PWA keyboard fix */
    input, textarea, select {
      -webkit-user-select: text !important;
      -webkit-touch-callout: default !important;
    }
    
    /* Prevent zoom on input focus */
    input[type="text"], input[type="tel"], input[type="password"] {
      font-size: 16px !important;
    }
  </style>
  <meta name="apple-mobile-web-app-title" content="AstroClick" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="manifest" href="/manifest.json" />
  <!-- Route-level SEO is managed by react-helmet-async and prerender output. Keep the shell head minimal to avoid stale duplicate tags. -->
  <title>AstroRoshni</title>
  <!-- Google tag (gtag.js): load after first paint / idle to reduce main-thread contention with React -->
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    function loadGtag() {
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=G-M0C9B8LGMR';
      s.onload = function () {
        gtag('js', new Date());
        gtag('config', 'G-M0C9B8LGMR');
      };
      document.head.appendChild(s);
    }
    if ('requestIdleCallback' in window) {
      requestIdleCallback(loadGtag, { timeout: 4000 });
    } else {
      window.addEventListener('load', loadGtag);
    }
  </script>
  
</head>
<body>
  <div id="root"></div>
</body>
</html>
